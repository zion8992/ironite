{{ define "content" }}

<div class="center-me-pls">
    <h2>Register</h2>
    <form action="/register" method="post">
        <input type="text" name="username" placeholder="Username" required /> <br>
        <input type="text" name="email" placeholder="Email" required /> <br>
        <input type="password" id="password" name="password" placeholder="Secure Password" required /> <br>
        <button type="submit">Register</button>
    </form>

    <p id="pass-status"></p>
</div>

<script>
const passwordInput = document.getElementById("password");
const passStatus = document.getElementById("pass-status");

passwordInput.addEventListener("input", () => {
	const password = passwordInput.value;

	const missing = [];
	const forbidden = [];

	// Length
	if (password.length < 11) {
		missing.push("have at least 11 characters");
	}

	// Count character types
	let upper = 0;
	let lower = 0;
	let digits = 0;
	let symbols = 0;

	for (const c of password) {
		if (c === "/" || c === "\\") {
			forbidden.push("cannot have slashes or backslashes");
			continue;
		}

		if (c >= "A" && c <= "Z") {
			upper++;
		} else if (c >= "a" && c <= "z") {
			lower++;
		} else if (c >= "0" && c <= "9") {
			digits++;
		} else {
			symbols++;
		}
	}

	if (upper < 2) {
		missing.push("have 2 UPPERCASE letters");
	}

	if (lower < 1) {
		missing.push("have 1 lowercase letter");
	}

	if (digits < 4) {
		missing.push("have 4 digits");
	}

	if (symbols < 1) {
		missing.push("have 1 symbol");
	}

	// Build message
	const messages = [];

	if (missing.length > 0) {
		messages.push(
			"Your password must " + missing.join(", ")
		);
	}

	if (forbidden.length > 0) {
		messages.push(
			"Your password cannot have slashes or backslashes"
		);
	}

	if (messages.length === 0) {
		passStatus.textContent = "Password meets all requirements";
		passStatus.style.color = "green";
	} else {
		passStatus.textContent = messages.join(" | ");
		passStatus.style.color = "red";
	}
});
</script>
{{ end }}
